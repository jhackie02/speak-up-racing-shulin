<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Speak Up Racing!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Balsamiq+Sans:ital,wght@0,400;0,700;1,400;1,700&family=Yusei+Magic&display=swap');

        body {
            font-family: 'Balsamiq Sans', 'Yusei Magic', 'Comic Sans MS', sans-serif;
            background-color: #121827; 
            color: #ffffff;
            height: 100dvh; 
            width: 100vw;
            overflow: hidden;
            touch-action: manipulation;
        }

        h1, h2, h3, .title-font {
            font-family: 'Balsamiq Sans', 'Comic Sans MS', cursive;
        }

        .btn-game {
            transition: transform 0.1s, box-shadow 0.1s;
            text-transform: capitalize;
            font-weight: bold;
            border-radius: 1rem;
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: none;
            cursor: pointer;
            user-select: none;
        }

        .btn-game:active {
            transform: translateY(6px);
        }

        .btn-red { background-color: #e54a4a; color: white; box-shadow: 0 6px 0 #b33939; }
        .btn-red:active { box-shadow: 0 0px 0 #b33939; }

        .btn-orange { background-color: #f27c21; color: white; box-shadow: 0 6px 0 #bd6119; }
        .btn-orange:active { box-shadow: 0 0px 0 #bd6119; }

        .btn-yellow { background-color: #f1c40f; color: white; box-shadow: 0 6px 0 #bfa00b; }
        .btn-yellow:active { box-shadow: 0 0px 0 #bfa00b; }

        .btn-green { background-color: #2ecc71; color: white; box-shadow: 0 6px 0 #23a058; }
        .btn-green:active { box-shadow: 0 0px 0 #23a058; }

        .btn-blue { background-color: #3b82f6; color: white; box-shadow: 0 6px 0 #2563eb; }
        .btn-blue:active { box-shadow: 0 0px 0 #2563eb; }

        .btn-purple { background-color: #a855f7; color: white; box-shadow: 0 6px 0 #7e22ce; }
        .btn-purple:active { box-shadow: 0 0px 0 #7e22ce; }
        
        .btn-dark { background-color: #2a3449; color: white; box-shadow: 0 6px 0 #1c2331; }
        .btn-dark:active { box-shadow: 0 0px 0 #1c2331; }

        .track-container {
            background-color: #555;
            border-top: 10px solid #888;
            border-bottom: 10px solid #888;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        .dashed-line {
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background-image: linear-gradient(to right, white 50%, transparent 50%);
            background-size: 40px 100%;
            transform: translateY(-50%);
        }

        .finish-line {
            position: absolute;
            right: 0;
            top: 0;
            bottom: 0;
            width: 30px;
            background: repeating-linear-gradient(
                45deg,
                #000,
                #000 10px,
                #fff 10px,
                #fff 20px
            );
            border-left: 2px solid white;
            z-index: 10;
        }

        .car {
            position: absolute;
            left: 5%;
            top: 50%;
            transform: translateY(-50%) scaleX(-1);
            font-size: 4rem; 
            transition: left 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            z-index: 20;
        }

        .smoke {
            position: absolute;
            bottom: 10px;
right: -15px;
            width: 15px;
            height: 15px;
            background: rgba(200, 200, 200, 0.8);
            border-radius: 50%;
            opacity: 0;
            animation: puff 1s infinite;
        }
        
        .is-moving .smoke {
            opacity: 1;
        }

        @keyframes puff {
            0% { transform: scale(0.5) translate(0, 0); opacity: 0.8; }
            100% { transform: scale(2) translate (20px, 10px); opacity: 0; }
        }

        .mic-pulse {
            animation: pulse-ring 1.25s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 20px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .screen { 
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            display: none; 
            opacity: 0; 
            transition: opacity 0.3s;
            overflow: hidden;
        }
        .screen.active { display: flex; opacity: 1; }

        header {
            background-color: #1f2739;
            border-bottom: 4px solid #f1c40f;
        }
        
        .header-title {
            color: #f1c40f;
            font-style: italic;
            font-weight: bold;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }

        canvas#confetti {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 9999;
        }
    </style>
</head>
<body class="antialiased h-screen flex flex-col">

    <header class="p-4 flex justify-between items-center shadow-md sticky top-0 z-50">
        <div class="flex items-center gap-3 cursor-pointer" onclick="app.navigate('grade')">
            <i class="fas fa-chess-board text-gray-300 text-2xl"></i>
            <h1 class="text-xl md:text-3xl header-title tracking-widest uppercase">Speak Up Racing!</h1>
        </div>
        <div class="flex items-center gap-4">
            <div id="userInfo" class="hidden font-bold text-yellow-400 bg-gray-800/50 px-4 py-2 rounded-xl text-sm border border-gray-700"></div>
            
            <button onclick="app.navigate('grade')" class="btn-game btn-dark px-4 py-2 text-sm hidden md:flex items-center gap-2">
                🏠 Main Menu
            </button>
            <button onclick="app.showDashboard()" class="btn-game btn-purple px-4 py-2 text-sm flex items-center gap-2" aria-label="Teacher Dashboard">
                📊 Teacher Panel
            </button>
            <button onclick="app.toggleFullScreen()" class="btn-game btn-blue px-4 py-2 text-sm flex items-center gap-2" aria-label="Full Screen">
                <i id="fs-icon" class="fas fa-expand"></i>
            </button>
        </div>
    </header>

    <main class="flex-grow relative w-full overflow-hidden">

        <div id="screen-grade" class="screen active flex-col items-center justify-center p-4 md:p-8">
            <div class="text-5xl md:text-7xl mb-2 flex-none">👦🏼</div>
            <h2 class="text-3xl md:text-6xl text-yellow-400 mb-2 font-bold drop-shadow-lg flex-none text-center">Choose Your Grade!</h2>
            
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3 md:gap-6 w-full max-w-5xl flex-1 min-h-0 pb-4">
            </div>
        </div>

        <div id="screen-student" class="screen flex-col items-center justify-center p-4 md:p-8">
            <div class="text-5xl md:text-7xl mb-2 flex-none">👦🏼</div>
            <h2 class="text-3xl md:text-6xl text-yellow-400 mb-2 font-bold drop-shadow-lg flex-none text-center">Who is playing?</h2>
            
            <div id="student-list" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-2 md:gap-4 w-full max-w-5xl flex-1 min-h-0 p-3 md:p-4 bg-gray-800/50 rounded-3xl border border-gray-700">
            </div>
            <button onclick="app.navigate('grade')" class="mt-4 flex-none btn-game btn-dark py-2 md:py-3 px-6 md:px-8"><i class="fas fa-arrow-left mr-2"></i> Back</button>
        </div>

        <div id="screen-topic" class="screen flex-col items-center justify-center p-4 md:p-8">
            <div class="text-5xl md:text-7xl mb-2 flex-none">👦🏼</div>
            <h2 class="text-3xl md:text-6xl text-yellow-400 mb-2 font-bold drop-shadow-lg flex-none text-center">Choose a Topic</h2>
            
            <div id="topic-list" class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6 w-full max-w-5xl flex-1 min-h-0">
            </div>
            <button onclick="app.navigate('student')" class="mt-4 flex-none btn-game btn-dark py-2 md:py-3 px-6 md:px-8"><i class="fas fa-arrow-left mr-2"></i> Back</button>
        </div>

        <div id="screen-game" class="screen flex-col p-4 justify-between">
            
            <div class="flex-none flex justify-between items-center bg-gray-800 border border-gray-700 rounded-2xl p-3 shadow-lg mb-4">
                <div>
                    <span id="game-level-badge" class="bg-blue-500 text-white px-3 py-1 md:px-4 md:py-2 rounded-xl font-bold text-sm md:text-lg shadow-inner">Level 1: Words</span>
                </div>
                <div class="font-bold text-gray-300 text-base md:text-xl">
                    Progress: <span id="game-progress" class="text-yellow-400 text-xl md:text-2xl ml-2">0/5</span>
                </div>
            </div>

            <div id="track" class="flex-none track-container h-[15vh] min-h-[80px] rounded-xl mb-4 relative border-4 border-gray-900">
                <div class="dashed-line"></div>
                <div class="finish-line"></div>
                <div id="player-car" class="car text-5xl md:text-7xl">
                    <span class="inline-block">🏎️</span>
                    <div class="smoke"></div>
                </div>
            </div>

            <div class="flex-1 min-h-0 flex flex-col items-center justify-center bg-gray-800 border border-gray-700 rounded-3xl p-4 md:p-8 shadow-2xl text-center relative">
                
                <div id="target-text" class="flex-1 flex items-center justify-center text-4xl sm:text-5xl md:text-7xl font-bold text-white mb-4 min-h-[60px] drop-shadow-md px-4 leading-tight text-center break-words" style="font-size: clamp(1rem, 5vw, 4rem);">
                    Apple
                </div>

                <div class="flex-none flex flex-row items-center gap-4 md:gap-8 w-full justify-center">
                    
                    <div class="flex flex-col md:flex-row gap-2 md:gap-4">
                        <button onclick="app.playAudio(1.0)" class="btn-game btn-blue p-4 rounded-2xl shadow-lg" aria-label="Listen Normal">
                            <i class="fas fa-volume-up text-2xl md:text-3xl"></i>
                        </button>
                        <button onclick="app.playAudio(0.3)" class="btn-game btn-purple p-4 rounded-2xl shadow-lg relative group" aria-label="Listen Slow">
                            <i class="fas fa-volume-up text-2xl md:text-3xl"></i>
                            <i class="fas fa-snail absolute bottom-1 right-1 text-xs bg-purple-900 rounded-full w-5 h-5 flex items-center justify-center border border-purple-400"></i>
                        </button>
                    </div>

                    <button id="mic-btn" onclick="app.toggleMic()" class="btn-game btn-red w-24 h-24 md:w-32 md:h-32 rounded-full flex items-center justify-center text-4xl md:text-6xl shadow-[0_8px_0_#b33939] active:shadow-[0_0px_0_#b33939] active:translate-y-[8px] mx-2 md:mx-4 border-4 border-red-300/30">
                        <i class="fas fa-microphone"></i>
                    </button>

                    <button onclick="app.skipWord()" class="btn-game btn-dark py-3 px-4 md:py-5 md:px-8 rounded-2xl text-base md:text-xl">
                        Skip <i class="fas fa-forward ml-2"></i>
                    </button>
                </div>
                
                <div id="recognition-status" class="flex-none mt-4 text-yellow-400 h-6 text-sm md:text-lg font-bold">Tap mic to speak</div>
            </div>
        </div>

        <div id="screen-results" class="screen flex-col items-center justify-center p-4 md:p-12 text-center">
            <div class="text-6xl md:text-8xl mb-4 flex-none">🏆</div>
            <h2 id="result-title" class="text-4xl md:text-6xl text-yellow-400 mb-2 font-bold drop-shadow-lg flex-none">Level Complete!</h2>
            <p id="result-desc" class="text-lg md:text-2xl text-gray-300 mb-6 flex-none">Great job driving!</p>
            
            <div class="bg-gray-800 border-2 border-gray-600 w-full max-w-sm mx-auto rounded-3xl p-6 mb-8 shadow-2xl flex-none">
                <div class="text-base md:text-xl text-gray-400 uppercase font-bold tracking-widest mb-2">Final Score</div>
                <div id="result-score" class="text-6xl md:text-8xl font-bold text-green-400 drop-shadow-[0_0_10px_rgba(74,222,128,0.5)]">100</div>
            </div>

            <div id="result-actions" class="flex flex-col sm:flex-row gap-4 flex-none">
            </div>
        </div>

        <div id="dashboard-modal" class="hidden fixed inset-0 bg-black/80 z-[100] flex items-center justify-center p-4 backdrop-blur-sm">
            <div class="bg-gray-800 border border-gray-600 rounded-3xl w-full max-w-4xl max-h-[90vh] flex flex-col shadow-2xl overflow-hidden text-white">
                <div class="p-6 bg-gray-900 border-b border-gray-700 flex justify-between items-center">
                    <h2 class="text-3xl font-bold text-yellow-400"><i class="fas fa-chart-bar mr-3"></i> Teacher Dashboard</h2>
                    <button onclick="app.hideDashboard()" class="text-gray-400 hover:text-white transition"><i class="fas fa-times text-4xl"></i></button>
                </div>
                
                <div class="p-8 overflow-y-auto flex-grow">
                    <div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="font-bold text-2xl text-white">Local Leaderboard / Submissions</h3>
                            <button onclick="app.clearLocalStats()" class="btn-game btn-red px-4 py-2 text-sm"><i class="fas fa-trash mr-2"></i> Clear Data</button>
                        </div>
                        <div class="bg-gray-900 rounded-2xl border border-gray-700 p-0 overflow-hidden shadow-inner">
                            <table class="w-full text-left text-lg text-gray-300">
                                <thead class="bg-gray-800 uppercase text-xs md:text-sm tracking-wider font-bold border-b border-gray-700 text-gray-400">
                                    <tr>
                                        <th class="p-3 md:p-4">Date</th>
                                        <th class="p-3 md:p-4">Student</th>
                                        <th class="p-3 md:p-4">Topic</th>
                                        <th class="p-3 md:p-4">Score</th>
                                    </tr>
                                </thead>
                                <tbody id="dashboard-table-body">
                                </tbody>
                            </table>
                            <div id="dashboard-empty" class="p-10 text-center text-gray-500 text-xl font-bold hidden">No data yet. Go race!</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>

    <script>
        const DATA = {
            students: {
                1: [{id: '0', name: 'Sample'}, {id: '1', name: 'Jack'}, {id: '2', name: 'Tin'}, {id: '3', name: 'Chi'}, {id: '4', name: 'Ryan'}, {id: '5', name: 'Drew'}, {id: '6', name: 'Jerry'}, {id: '7', name: 'Judy'}],
                2: [{id: '0', name: 'Sample'}, {id: '1', name: 'Harry'}, {id: '2', name: 'Hugo'}, {id: '3', name: 'Yohan'}, {id: '4', name: 'Jenny'}, {id: '5', name: 'Gigi'}, {id: '6', name: 'Anna'}, {id: '7', name: 'Zoe'}],
                3: [{id: '0', name: 'Sample'}, {id: '1', name: 'Chen'}, {id: '2', name: 'Jacob'}, {id: '3', name: 'Yoga'}, {id: '4', name: 'Jason'}, {id: '5', name: 'Andy'}, {id: '6', name: 'Louis'}, {id: '7', name: 'Jane'}, {id: '8', name: 'Cindy'}, {id: '9', name: 'Bella'}, {id: '10', name: 'Henin'}],
                4: [{id: '0', name: 'Sample'}, {id: '1', name: 'Paul'}, {id: '2', name: 'Vincent'}, {id: '3', name: 'Brian'}, {id: '4', name: 'Alice'}, {id: '5', name: 'Emma'}, {id: '6', name: 'Jean'}, {id: '7', name: 'Coco'}, {id: '8', name: 'Mika'}],
                5: [{id: '0', name: 'Sample'}, {id: '1', name: 'Eason'}, {id: '2', name: 'Sean'}],
                6: [{id: '0', name: 'Sample'}, {id: '1', name: 'Leo'}, {id: '2', name: 'Rody'}, {id: '4', name: 'Daren'}]
            },
            topics: {
                1: [
                    { id: 't1', title: 'A-E', l1: ['apple', 'boy', 'ball', 'cat', 'car', 'dog', 'dinosaur', 'egg', 'elephant'], l2: ['It is an apple.', 'I like dogs.', 'I eat eggs.', 'The elephant is big.', 'The dinosaur is big.', 'The ant is small.', 'I am a boy.'] },
                    { id: 't1_2', title: 'F-J', l1: ['fan', 'fish', 'go', 'goat', 'hat', 'horse', 'in', 'ink', 'juice', 'jump'], l2: ['I can jump.', 'I can go.', "I like juice.", 'I like fish.', 'The horse can jump.', 'The horse has a hat.', 'The goat likes juice.'] }
                ],
                2: [{ id: 't2', title: 'Seafood in Cigu', l1: ['land', 'sea', 'water', 'seafood', 'clams', 'oysters', 'shrimp', 'milkfish'], l2: ['The clams is in the water.', 'I like milkfish.', 'I don’t eat seafood.', 'I want shrimp.', 'They are clams.', 'It is a milkfish.', 'I don’t like oysters.'] },
                    { id: 't2_2', title: 'N-R', l1: ['nose', 'no', 'nest', 'nine', 'ox', 'on', 'ostrich', 'octopus', 'pumpkin', 'pancake', 'pizza', 'popcorn', 'queen', 'question', 'quail', 'quiet', 'rabbit', 'rose', 'rainbow', 'rock'], l2: ['The quail is on the ox', 'I eat pizza and popcorn.', 'Do you like pancakes?', 'The teacher says no.', 'The queen is beautiful.', 'I have a question.'] }
                ],
                3: [{ id: 't3', title: 'Jobs', l1: ['teacher', 'doctor', 'nurse', 'student', 'farmer', 'cook'], l2: ['He is a teacher.', 'We are students.', 'Is he a farmer?', 'Is she a nurse?', 'My father is a cook.', 'My mother is a teacher.', 'My brother is a doctor.'] }],
                4: [{ id: 't4', title: 'Animals', l1: ['tigers', 'zebras', 'bears', 'monkeys', 'lions', 'giraffes', 'elephants', 'rhinos', 'horses'], l2: ['I like tigers.', 'I don’t like monkeys.', 'Do you like giraffes?', 'I like bears.', 'The elephants are big.', 'It is a horse.', 'They are lions.'] }],
                5: [{ id: 't5', title: 'WW6-U4', l1: ['water bottle', 'key', 'umbrella', 'jacket', 'watch', 'smartphone', 'glasses'], l2: ['Whose jacket is it?', 'It’s my jacket.', 'Whose smartphone is it?', 'It’s her smartphone.', 'Whose umbrella is it?', 'It’s his umbrella.', 'Whose watch is it?', 'It’s Kevin’s watch.', 'Whose key is it?', 'It’s Amy’s key.', 'Whose glasses are they?', 'They’re my glasses.'] }],
                6: [{ id: 't6', title: 'WW8-U4', l1: ['library', 'coffee shop', 'museum', 'sports center', 'night market', 'movie theater'], l2: ['Where were you two days ago?', 'Were you at the museum yesterday?', 'Was she at the sports center an hour ago?', 'Where was he last night?', 'She was at the night market.', 'Yes, I was.', 'Yes, he was.', 'Yes, they were.', 'No, she wasn’t.', 'No, we weren’t.'] }]
            }
        };

        class AudioEngine {
            constructor() {
                this.ctx = null;
                this.synth = window.speechSynthesis;
                this.voices = [];
                this.synth.onvoiceschanged = () => { this.voices = this.synth.getVoices(); };
            }
            initContext() {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                if (this.ctx.state === 'suspended') this.ctx.resume();
            }
            playTTS(text, rate = 1.0) {
                if (this.synth.speaking) this.synth.cancel();
                let utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = rate;
                utterance.lang = 'en-US';
                this.synth.speak(utterance);
            }
            playTone(freq, type, duration, vol=0.1) {
                this.initContext();
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, this.ctx.currentTime);
                gain.gain.setValueAtTime(vol, this.ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + duration);
                osc.connect(gain); gain.connect(this.ctx.destination);
                osc.start(); osc.stop(this.ctx.currentTime + duration);
            }
            playSuccess() { this.playTone(523.25, 'sine', 0.1); setTimeout(() => this.playTone(783.99, 'sine', 0.3), 200); }
            playTryAgain() { this.playTone(300, 'triangle', 0.2); setTimeout(() => this.playTone(250, 'triangle', 0.3), 150); }
            playMicStart() { this.playTone(800, 'sine', 0.1, 0.05); }
        }

        class App {
            constructor() {
                this.state = { grade: null, themeClass: 'btn-blue', student: null, topic: null, level: 1, currentPool: [], currentItem: '', progress: 0, totalAttempts: 0, totalScore: 0, l1FinalScore: null, isListening: false };
                this.audio = new AudioEngine();
                this.initSpeechRecognition();
            }

            async requestMicPermission() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    stream.getTracks().forEach(track => track.stop());
                } catch (err) { console.warn("Mic permission denied", err); }
            }

            initSpeechRecognition() {
                const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
                if (SpeechRecognition) {
                    this.recognition = new SpeechRecognition();
                    this.recognition.lang = 'en-US';
                    this.recognition.interimResults = false;
                    this.recognition.onstart = () => { this.state.isListening = true; this.updateMicUI(); this.audio.playMicStart(); };
                    this.recognition.onresult = (event) => { const transcript = event.results[0][0].transcript; this.handleSpeechResult(transcript); };
                    this.recognition.onend = () => { this.state.isListening = false; this.updateMicUI(); };
                }
            }

            playAudio(rate) { this.audio.playTTS(this.state.currentItem, rate); }

            navigate(screenId) {
                document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
                const target = document.getElementById(`screen-${screenId}`);
                if(target) target.classList.add('active');
                if (screenId === 'grade') this.renderGrades();
                if (screenId === 'student') this.renderStudents();
                if (screenId === 'topic') this.renderTopics();
                this.updateHeader();
            }

            updateHeader() {
                const ui = document.getElementById('userInfo');
                if (this.state.student) {
                    ui.innerHTML = `G${this.state.grade} - ${this.state.student.name}`;
                    ui.className = `font-bold text-white px-4 py-2 rounded-xl text-sm border-2 ${this.state.themeClass} shadow-inner`;
                    ui.classList.remove('hidden');
                } else { ui.classList.add('hidden'); }
            }

            renderGrades() {
                const container = document.querySelector('#screen-grade .grid');
                container.innerHTML = '';
                const btnColors = { 1: 'btn-red', 2: 'btn-orange', 3: 'btn-yellow', 4: 'btn-green', 5: 'btn-blue', 6: 'btn-purple' };
                [1,2,3,4,5,6].forEach((g) => {
                    const btn = document.createElement('button');
                    btn.className = `btn-game ${btnColors[g]} text-3xl md:text-5xl h-full w-full py-4 rounded-3xl`;
                    btn.innerHTML = `Grade ${g}`;
                    btn.onclick = () => { this.requestMicPermission(); this.state.grade = g; this.state.themeClass = btnColors[g]; this.audio.initContext(); this.navigate('student'); };
                    container.appendChild(btn);
                });
            }

            renderStudents() {
                const container = document.getElementById('student-list');
                container.innerHTML = '';
                const students = DATA.students[this.state.grade] || [];
                students.forEach(s => {
                    const btn = document.createElement('button');
                    btn.className = `btn-game ${this.state.themeClass} py-2 px-2 rounded-2xl font-extrabold h-full w-full flex items-center justify-center text-center text-base md:text-2xl whitespace-nowrap overflow-hidden min-w-0`;
                    btn.innerHTML = `<span class="truncate w-full">${s.id}. ${s.name}</span>`;
                    btn.onclick = () => { this.state.student = s; this.navigate('topic'); };
                    container.appendChild(btn);
                });
            }

            renderTopics() {
                const container = document.getElementById('topic-list');
                container.innerHTML = '';
                const topics = DATA.topics[this.state.grade] || [];
                topics.forEach(t => {
                    const btn = document.createElement('button');
                    btn.className = `btn-game ${this.state.themeClass} p-4 md:py-8 rounded-3xl flex items-center justify-center h-full w-full text-2xl md:text-5xl font-extrabold leading-tight text-center`;
                    btn.innerHTML = `<span class="text-center font-extrabold">${t.title}</span>`;
                    btn.onclick = () => { this.state.topic = t; this.startGame(1); };
                    container.appendChild(btn);
                });
            }

            startGame(level) {
                this.state.level = level;
                this.state.progress = 0;
                this.state.totalAttempts = 0;
                this.state.totalScore = 0;
                const rawPool = this.state.level === 1 ? this.state.topic.l1 : this.state.topic.l2;
                this.state.currentPool = this.shuffleArray([...rawPool]);
                this.navigate('game');
                document.getElementById('game-level-badge').innerText = level === 1 ? "Level 1: Words" : "Level 2: Sentences";
                this.updateCarPosition();
                this.nextWord();
            }

            shuffleArray(array) { for (let i = array.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]]; } return array; }

            nextWord() {
                if (this.state.progress >= 5) { this.endLevel(); return; }
                this.state.currentItem = this.state.currentPool.shift();
                document.getElementById('target-text').innerText = this.state.currentItem;
                document.getElementById('recognition-status').innerText = "Tap mic to speak";
            }

            skipWord() { this.state.currentPool.push(this.state.currentItem); this.nextWord(); }

            toggleMic() { if(this.recognition) this.state.isListening ? this.recognition.stop() : this.recognition.start(); }

            updateMicUI() {
                const btn = document.getElementById('mic-btn');
                this.state.isListening ? btn.classList.add('mic-pulse') : btn.classList.remove('mic-pulse');
            }

            handleSpeechResult(transcript) {
                const score = this.calculateScore(transcript, this.state.currentItem);
                this.state.totalAttempts++;
                this.state.totalScore += score;
                
                let feedback = "";
                if(score >= 90) feedback = "Perfect!";
                else if(score >= 75) feedback = "Great!";
                else if(score >= 60) feedback = "Good!";
                else feedback = "Try again!";
                
                document.getElementById('recognition-status').innerText = feedback;
                
                if (score >= 60) {
                    this.state.progress++;
                    this.updateCarPosition();
                    this.audio.playSuccess();
                    document.getElementById('track').classList.add('is-moving');
                    setTimeout(() => { document.getElementById('track').classList.remove('is-moving'); this.nextWord(); }, 1500);
                } else {
                    this.audio.playTryAgain();
                }
            }

            calculateScore(spoken, target) {
                const clean = str => str.toLowerCase().replace(/[^\w\s]/gi, '').trim();
                const tWords = clean(target).split(/\s+/);
                const sWords = clean(spoken).split(/\s+/);
                let matches = tWords.filter(tw => sWords.some(sw => sw.includes(tw) || tw.includes(sw))).length;
                return Math.round((matches / tWords.length) * 100);
            }

            updateCarPosition() {
                const car = document.getElementById('player-car');
                document.getElementById('game-progress').innerText = `${this.state.progress}/5`;
                car.style.left = `${5 + (this.state.progress / 5) * 85}%`;
            }

            endLevel() {
                this.navigate('results');
                const isLevel1 = this.state.level === 1;
                const finalScore = Math.round((this.state.totalScore / Math.max(1, this.state.totalAttempts)));
                
                if (isLevel1) this.state.l1FinalScore = finalScore;
                
                document.getElementById('result-score').innerText = finalScore;
                const actions = document.getElementById('result-actions');
                actions.innerHTML = '';
                
                if (isLevel1) {
                    this.addButton(actions, "Play Again", () => this.startGame(1), 'btn-yellow');
                    if(finalScore >= 60) this.addButton(actions, "Next Level", () => this.startGame(2), 'btn-green');
                } else {
                    const avg = Math.round(((this.state.l1FinalScore || finalScore) + finalScore) / 2);
                    document.getElementById('result-score').innerText = avg;
                    this.addButton(actions, "Play Again (L1 & L2)", () => this.startGame(1), 'btn-yellow');
                    if(avg >= 60) this.addButton(actions, "Next Topic", () => this.navigate('topic'), 'btn-blue');
                    this.saveDataAndSend(avg);
                }
            }

            addButton(container, text, onclick, color) {
                const btn = document.createElement('button');
                btn.className = `btn-game ${color} text-xl md:text-2xl py-4 px-8`;
                btn.innerText = text;
                btn.onclick = onclick;
                container.appendChild(btn);
            }

            saveDataAndSend(score) {
                const data = { timestamp: new Date().toLocaleString(), grade: "Grade " + this.state.grade, studentName: this.state.student.name, topic: this.state.topic.title, totalScore: score };
                let history = JSON.parse(localStorage.getItem('sr_history') || '[]');
                history.unshift(data);
                localStorage.setItem('sr_history', JSON.stringify(history));
                fetch("https://script.google.com/macros/s/AKfycbw3AYdsYSRFnSTW4hgSwC9GVePlIHaZKHtWrMk_0gsfBeeAyXWp1yJPkWyEmepZ4uuUvQ/exec", {
                    method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data)
                }).catch(console.error);
            }

            showDashboard() { document.getElementById('dashboard-modal').classList.remove('hidden'); this.renderDashboardTable(); }
            hideDashboard() { document.getElementById('dashboard-modal').classList.add('hidden'); }
            renderDashboardTable() {
                const history = JSON.parse(localStorage.getItem('sr_history') || '[]');
                const tbody = document.getElementById('dashboard-table-body');
                tbody.innerHTML = '';
                history.forEach(r => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `<td class="p-4">${r.timestamp}</td><td class="p-4 font-bold">${r.studentName}</td><td class="p-4">${r.topic}</td><td class="p-4 font-bold text-green-400">${r.totalScore}</td>`;
                    tbody.appendChild(tr);
                });
                document.getElementById('dashboard-empty').classList.toggle('hidden', history.length > 0);
            }
            toggleFullScreen() { !document.fullscreenElement ? document.documentElement.requestFullscreen() : document.exitFullscreen(); }
            clearLocalStats() { if(confirm("Clear history?")) { localStorage.removeItem('sr_history'); this.renderDashboardTable(); } }
        }

        const app = new App();
        app.navigate('grade');
    </script>
    <canvas id="confetti"></canvas>
</body>
</html>
